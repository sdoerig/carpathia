name: Test

on:
  push:
    branches: 
      - '**' 
  pull_request:
    branches: 
      - '**'

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Testing with PostgreSQL and Pagila schema
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: carpathia
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Rust toolchain + caching
      - name: Rust toolchain einrichten
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo Cache aktivieren
        uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true

      - name: Abhängigkeiten installieren
        run: sudo apt-get update && sudo apt-get install -y libpq-dev postgresql-client

      # Pagila-Schema aus dem Repo statt wget
      - name: Pagila-Schema bereitstellen
        run: cp fixtures/pagila-schema.sql pagila-schema.sql

      - name: Pagila-Schema in PostgreSQL importieren
        run: |
          until pg_isready -h localhost -U postgres; do
            sleep 1
          done
          psql -h localhost -U postgres -d carpathia -f pagila-schema.sql
        env:
          PGPASSWORD: postgres

      # Linting
      #- name: Rust Linting (clippy)
      #  run: cargo clippy --all-targets --all-features -- -D warnings

      # Tests
      - name: Tests ausführen
        run: cargo test
        env:
          TEST_DB_URL: postgres://postgres:postgres@localhost:5432
          TEST_DB_NAME: carpathia
