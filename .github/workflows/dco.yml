name: DCO Check

on:  
  pull_request:  
    branches: [ main ]

jobs:  
  dco-check:  
    runs-on: ubuntu-latest  
    steps:  
      - name: Checkout repository  
        uses: actions/checkout@v4  
        with:  
          fetch-depth: 0  
      - name: Check DCO  
        uses: deepakputhray/action-dco@v2